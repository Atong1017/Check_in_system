<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>登入 — 時間日誌</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --border: #2e2e3e;
      --text: #e8e8f0;
      --text-muted: #7a7a9a;
      --accent: #7c6fff;
      --accent-hover: #6a5eef;
    }
    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 28px;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      font-size: 2.5rem;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .login-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .form-control {
      background: #22222f;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .form-control:focus {
      background: #22222f;
      border-color: var(--accent);
      color: var(--text);
      box-shadow: 0 0 0 3px rgba(124,111,255,0.2);
    }
    .form-label {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 6px;
    }
    .btn-login {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 1rem;
      font-weight: 600;
      width: 100%;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-login:hover {
      background: var(--accent-hover);
      color: #fff;
    }
    .error-msg {
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center">
      <div class="login-logo"><i class="bi bi-clock-history"></i></div>
      <div class="login-title">時間日誌</div>
      <div class="login-sub">Time Log System</div>
    </div>

    {% if form.errors %}
    <div class="error-msg">
      <i class="bi bi-exclamation-circle me-1"></i>帳號或密碼錯誤，請重新輸入。
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">帳號</label>
        <input type="text" name="username" class="form-control" placeholder="請輸入帳號"
               value="{{ form.username.value|default:'' }}" autocomplete="username" autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label">密碼</label>
        <input type="password" name="password" class="form-control" placeholder="請輸入密碼"
               autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-1"></i>登入
      </button>
      <input type="hidden" name="next" value="{{ next }}">
    </form>
  </div>
</body>
</html>
